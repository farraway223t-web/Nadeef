  const [step, setStep] = useState(1);
  const [form, setForm] = useState({ name:"", phone:"", address:"", service:"", date:"", size:"" });
  const [done, setDone] = useState(false);
  const [errors, setErrors] = useState({});
  const bookingRef = `ND${Date.now().toString().slice(-5)}`;

  const inp = {
    background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)",
    borderRadius:"10px", padding:"13px 16px", color:"#fff", fontSize:"14px",
    fontFamily:"inherit", outline:"none", width:"100%", boxSizing:"border-box", direction:"rtl",
    transition:"border-color 0.2s"
  };

  return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.85)", zIndex:200,
      display:"flex", alignItems:"center", justifyContent:"center", padding:"16px", backdropFilter:"blur(8px)" }}>
      <div onClick={e=>e.stopPropagation()} style={{
        background:"linear-gradient(135deg, #0f1923 0%, #0a1628 100%)",
        border:`1px solid ${company.color}44`,

        <div style={{ height:"3px", background:`linear-gradient(90deg, transparent, ${company.color}, transparent)` }} />

        {/* Header */}
        <div style={{ padding:"24px 28px 20px", borderBottom:"1px solid rgba(255,255,255,0.06)" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
            <div>
              <div style={{ color:"rgba(255,255,255,0.4)", fontSize:"11px", fontWeight:"600",

              <div style={{ color:"#fff", fontWeight:"800", fontSize:"18px" }}>{company.nameAr}</div>
              <div style={{ display:"flex", alignItems:"center", gap:"12px", marginTop:"8px" }}>
                <span style={{ color:"#fbbf24", fontSize:"13px" }}>★ {company.rating}</span>
                <span style={{ color:company.color, fontSize:"13px" }}>📞 {company.phone}</span>
              </div>
            </div>
            <button onClick={onClose} style={{ background:"rgba(255,255,255,0.08)", border:"none",
              color:"rgba(255,255,255,0.5)", cursor:"pointer", width:"36px", height:"36px",
              borderRadius:"50%", fontSize:"18px", display:"flex", alignItems:"center", justifyContent:"center" }}>×</button>
          </div>
        </div>

        <div style={{ padding:"24px 28px" }}>
          {done ? (
            <div style={{ textAlign:"center", padding:"16px 0" }}>
              <div style={{ width:"72px", height:"72px", margin:"0 auto 20px",
                background:`${company.color}18`, border:`2px solid ${company.color}`,
                borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center",
                fontSize:"28px" }}>✓</div>
              <div style={{ color:"#fff", fontSize:"20px", fontWeight:"800", marginBottom:"8px" }}>تم الحجز بنجاح!</div>
              <div style={{ color:"rgba(255,255,255,0.5)", fontSize:"13px", marginBottom:"8px" }}>
                رقم الحجز: <span style={{ color:company.color, fontWeight:"700" }}>#{bookingRef}</span>
              </div>
              <div style={{ color:"rgba(255,255,255,0.4)", fontSize:"13px", marginBottom:"24px" }}>
                هيتواصل معاك فريقنا خلال ساعتين لتأكيد الحجز
              </div>
              {/* WhatsApp link to admin - sends booking details */}
              <a
                href={`https://wa.me/201114875470?text=${encodeURIComponent(
`🔔 حجز جديد على منصة نظيف
━━━━━━━━━━━━━━
رقم الحجز: #${bookingRef}
👤 الاسم: ${form.name}
📞 التليفون: ${form.phone}
📍 العنوان: ${form.address}
🧹 الخدمة: ${form.service}
📐 الحجم: ${form.size || 'لم يحدد'}
📅 التاريخ: ${form.date}
🏢 الشركة المطلوبة: ${company.nameAr}
📞 تليفون الشركة: ${company.phone}
━━━━━━━━━━━━━━
⚡ تواصل مع العميل في أقرب وقت`
                )}`}
                target="_blank"
                rel="noopener noreferrer"
                style={{
                  display:"block", background:"#25d366", color:"#fff",
                  borderRadius:"12px", padding:"14px", textDecoration:"none",
                  fontFamily:"inherit", fontSize:"15px", fontWeight:"800", marginBottom:"10px"
                }}>
                📲 استلم تفاصيل الحجز على واتساب
              </a>
              <button onClick={onClose} style={{ background:"rgba(255,255,255,0.06)", color:"rgba(255,255,255,0.6)",
                border:"1px solid rgba(255,255,255,0.1)", borderRadius:"12px", padding:"12px",
                cursor:"pointer", fontFamily:"inherit", fontSize:"14px", width:"100%" }}>إغلاق</button>
            </div>
          ) : (
            <>
              {/* Progress */}
              <div style={{ display:"flex", gap:"6px", marginBottom:"24px" }}>
                {[1,2].map(s=>(
                  <div key={s} style={{ flex:1, height:"3px", borderRadius:"2px",
                    background: step>=s ? company.color : "rgba(255,255,255,0.1)", transition:"all 0.4s" }} />
                ))}
              </div>

              {step===1 && (
                <div style={{ display:"flex", flexDirection:"column", gap:"12px" }}>
                  <p style={{ color:"rgba(255,255,255,0.5)", fontSize:"12px", margin:"0 0 4px",
                    fontWeight:"600", letterSpacing:"0.05em" }}>بياناتك</p>
                  {[
                    { key:"name", ph:"الاسم الكريم" },
                    { key:"phone", ph:"رقم التليفون", type:"tel" },
                    { key:"address", ph:"العنوان بالتفصيل" },
                  ].map(f=>(
                    <input key={f.key} type={f.type||"text"} placeholder={f.ph}
                      value={form[f.key]} onChange={e=>setForm({...form,[f.key]:e.target.value})}
                      style={inp} />
                  ))}
                  {errors.step1 && (
                    <div style={{ background:"rgba(248,113,113,0.1)", border:"1px solid rgba(248,113,113,0.3)",
                      borderRadius:"10px", padding:"10px 14px", color:"#f87171", fontSize:"13px" }}>
                      ⚠️ {errors.step1}
                    </div>
                  )}
                  <button onClick={()=>{
                    if(!form.name.trim()) { setErrors({step1:"من فضلك اكتب اسمك"}); return; }
                    if(!form.phone.trim()) { setErrors({step1:"من فضلك اكتب رقم التليفون"}); return; }
                    if(!form.address.trim()) { setErrors({step1:"من فضلك اكتب العنوان"}); return; }
                    setErrors({});
                    setStep(2);
                  }} style={{
                    background:`linear-gradient(135deg, ${company.color}, ${company.color}cc)`,
                    color:"#000", border:"none", borderRadius:"12px", padding:"14px",
                    cursor:"pointer", fontFamily:"inherit", fontSize:"15px", fontWeight:"800",
                    marginTop:"4px"
                  }}>التالي ←</button>
                </div>
              )}

              {step===2 && (
                <div style={{ display:"flex", flexDirection:"column", gap:"12px" }}>
                  <p style={{ color:"rgba(255,255,255,0.5)", fontSize:"12px", margin:"0 0 4px",
                    fontWeight:"600", letterSpacing:"0.05em" }}>تفاصيل الخدمة</p>
                  <select value={form.service} onChange={e=>setForm({...form,service:e.target.value})} style={inp}>
                    <option value="">اختر الخدمة</option>
                    {company.services.map(s=><option key={s} value={s}>{s}</option>)}
                  </select>
                  <select value={form.size} onChange={e=>setForm({...form,size:e.target.value})} style={inp}>
                    <option value="">حجم المكان</option>
                    <option>شقة صغيرة (1-2 غرفة)</option>
                    <option>شقة متوسطة (3-4 غرفة)</option>
                    <option>دوبلكس / فيلا</option>
                    <option>مكتب / محل</option>
                  </select>
                  <input type="date" value={form.date}
                    onChange={e=>setForm({...form,date:e.target.value})} style={inp} />
                  {/* Price box */}
                  <div style={{ background:`${company.color}10`, border:`1px solid ${company.color}30`,
                    borderRadius:"12px", padding:"14px 16px",
                    display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <div>
                      <div style={{ color:"rgba(255,255,255,0.4)", fontSize:"11px" }}>السعر يبدأ من</div>
                      <div style={{ color:company.color, fontWeight:"900", fontSize:"24px" }}>{company.price} ج</div>
                    </div>
                    <div style={{ color:"rgba(255,255,255,0.3)", fontSize:"12px", textAlign:"left" }}>
                      السعر النهائي<br/>حسب الحجم
                    </div>
                  </div>
                  {errors.step2 && (
                    <div style={{ background:"rgba(248,113,113,0.1)", border:"1px solid rgba(248,113,113,0.3)",
                      borderRadius:"10px", padding:"10px 14px", color:"#f87171", fontSize:"13px" }}>
                      ⚠️ {errors.step2}
                    </div>
                  )}
                  <div style={{ display:"flex", gap:"10px" }}>
                    <button onClick={()=>{ setErrors({}); setStep(1); }} style={{ flex:1, background:"rgba(255,255,255,0.06)",
                      color:"rgba(255,255,255,0.5)", border:"1px solid rgba(255,255,255,0.08)",
                      borderRadius:"12px", padding:"13px", cursor:"pointer", fontFamily:"inherit", fontSize:"14px" }}>
                      ← رجوع
                    </button>
                    <button onClick={()=>{
                      if(!form.service) { setErrors({step2:"من فضلك اختار الخدمة"}); return; }
                      if(!form.date) { setErrors({step2:"من فضلك اختار التاريخ"}); return; }
                      setErrors({});
                      setDone(true);
                    }}
                      style={{ flex:2, background:`linear-gradient(135deg, ${company.color}, ${company.color}cc)`,
                        color:"#000", border:"none", borderRadius:"12px", padding:"13px",
                        cursor:"pointer", fontFamily:"inherit", fontSize:"15px", fontWeight:"800" }}>
                      ✓ تأكيد الحجز
                    </button>
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ============ COMPANY CARD ============
function CompanyCard({ company, onBook, index }) {
  const [hov, setHov] = useState(false);
  const initials = company.name.split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase();

  return (
    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{
        background: hov
          ? `linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.02) 100%)`
          : `rgba(255,255,255,0.02)`,
        border:`1px solid ${hov ? company.color+"44" : "rgba(255,255,255,0.07)"}`,
        borderRadius:"20px", padding:"24px",
        transition:"all 0.35s cubic-bezier(0.4,0,0.2,1)",
        transform: hov ? "translateY(-6px)" : "none",
        boxShadow: hov ? `0 24px 48px rgba(0,0,0,0.4), 0 0 0 1px ${company.color}18` : "none",
        position:"relative", overflow:"hidden", cursor:"default",
        animationDelay:`${index*0.05}s`
      }}>

      {/* Top glow line */}
      <div style={{ position:"absolute", top:0, left:0, right:0, height:"1px",
        background: hov ? `linear-gradient(90deg, transparent 0%, ${company.color} 50%, transparent 100%)` : "transparent",
        transition:"all 0.35s" }} />

      {/* Badge */}
      {company.badge && (
        <div style={{ position:"absolute", top:"16px", left:"16px",
          background:`${company.color}18`, border:`1px solid ${company.color}33`,
          borderRadius:"20px", padding:"3px 10px",
          color:company.color, fontSize:"10px", fontWeight:"700", letterSpacing:"0.05em" }}>
          {company.badge}
        </div>
      )}

      {/* Availability */}
      <div style={{ position:"absolute", top:"16px", right:"16px",
        display:"flex", alignItems:"center", gap:"5px" }}>
        <div style={{ width:"6px", height:"6px", borderRadius:"50%",
          background: company.available ? "#22c55e" : "#64748b",
          boxShadow: company.available ? "0 0 6px #22c55e" : "none" }} />
        <span style={{ color: company.available ? "#22c55e" : "#64748b", fontSize:"11px", fontWeight:"600" }}>
          {company.available ? "متاح الآن" : "مشغول"}
        </span>
      </div>

      {/* Avatar */}
      <div style={{ marginTop: company.badge ? "28px" : "0", marginBottom:"16px" }}>
        <div style={{ width:"52px", height:"52px", borderRadius:"14px",
          background:`linear-gradient(135deg, ${company.color}28, ${company.color}10)`,
          border:`1px solid ${company.color}33`,
          display:"flex", alignItems:"center", justifyContent:"center",
          color:company.color, fontWeight:"900", fontSize:"16px",
          fontFamily:"'Space Grotesk', sans-serif" }}>
          {initials}
        </div>
      </div>

      {/* Name */}
      <div style={{ color:"#fff", fontWeight:"800", fontSize:"16px", marginBottom:"4px", lineHeight:"1.3" }}>
        {company.nameAr}
      </div>
      <div style={{ color:"rgba(255,255,255,0.35)", fontSize:"12px", marginBottom:"16px" }}>
        📍 {company.area}
      </div>

      {/* Rating bar */}
      <div style={{ display:"flex", alignItems:"center", gap:"8px", marginBottom:"14px" }}>
        <div style={{ display:"flex", gap:"2px" }}>
          {[1,2,3,4,5].map(s=>(
            <span key={s} style={{ color: s<=Math.round(company.rating) ? "#fbbf24" : "rgba(255,255,255,0.15)", fontSize:"12px" }}>★</span>
          ))}
        </div>
        <span style={{ color:"#fbbf24", fontWeight:"700", fontSize:"14px" }}>{company.rating}</span>
        <span style={{ color:"rgba(255,255,255,0.3)", fontSize:"12px" }}>({company.reviews} تقييم)</span>
      </div>

      {/* Services tags */}
      <div style={{ display:"flex", flexWrap:"wrap", gap:"6px", marginBottom:"18px" }}>
        {company.services.map(s=>(
          <span key={s} style={{ background:"rgba(255,255,255,0.06)", color:"rgba(255,255,255,0.5)",
            fontSize:"11px", padding:"4px 10px", borderRadius:"8px", fontWeight:"500" }}>{s}</span>
        ))}
      </div>

      {/* Footer */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
        paddingTop:"16px", borderTop:"1px solid rgba(255,255,255,0.06)" }}>
        <div>
          <div style={{ color:"rgba(255,255,255,0.3)", fontSize:"10px", fontWeight:"600", letterSpacing:"0.08em" }}>يبدأ من</div>
          <div style={{ color:company.color, fontWeight:"900", fontSize:"22px", lineHeight:"1" }}>{company.price}<span style={{ fontSize:"13px", fontWeight:"600" }}> ج</span></div>
        </div>
        <button onClick={()=>onBook(company)} disabled={!company.available}
          style={{
            background: company.available ? `linear-gradient(135deg, ${company.color}, ${company.color}bb)` : "rgba(255,255,255,0.06)",
            color: company.available ? "#000" : "rgba(255,255,255,0.25)",
            border:"none", borderRadius:"12px", padding:"11px 22px",
            cursor: company.available ? "pointer" : "not-allowed",
            fontFamily:"inherit", fontSize:"14px", fontWeight:"800",
            transition:"all 0.2s", letterSpacing:"0.02em"
          }}>
          {company.available ? "احجز الآن" : "غير متاح"}
        </button>
      </div>
    </div>
  );
}

            padding:"6px 6px 6px 6px", gap:"8px", maxWidth:"580px", margin:"0 auto",
            boxShadow:"0 0 60px rgba(34,211,238,0.06)" }}>
            <div style={{ flex:1, display:"flex", alignItems:"center", gap:"10px", padding:"4px 14px" }}>
              <span style={{ color:"rgba(255,255,255,0.25)", fontSize:"16px" }}>🔍</span>
              <input type="search" placeholder="ابحث: شركة، منطقة، نوع خدمة..."
                value={search} onChange={e=>setSearch(e.target.value)}
                style={{ flex:1, background:"transparent", border:"none", color:"#fff",
                  fontSize:"15px", fontFamily:"inherit", outline:"none", direction:"rtl" }} />
            </div>
            <button style={{ background:"linear-gradient(135deg,#22d3ee,#0891b2)", color:"#000",
              border:"none", borderRadius:"12px", padding:"12px 28px", cursor:"pointer",
              fontFamily:"inherit", fontSize:"15px", fontWeight:"800", whiteSpace:"nowrap" }}>
              ابحث الآن
            </button>
          </div>

          {/* Trust signals */}
          <div style={{ display:"flex", justifyContent:"center", gap:"36px", marginTop:"40px",
            flexWrap:"wrap" }}>
            {[
              { n:"15+", l:"شركة مسجلة" },
              { n:"500+", l:"حجز مكتمل" },
              { n:"4.7/5", l:"متوسط التقييم" },
              { n:"مجاناً", l:"الحجز بدون رسوم" },
            ].map(s=>(
              <div key={s.l} style={{ textAlign:"center" }}>
                <div style={{ color:"#22d3ee", fontWeight:"900", fontSize:"20px",
                  letterSpacing:"-0.02em" }}>{s.n}</div>
                <div style={{ color:"rgba(255,255,255,0.3)", fontSize:"12px", marginTop:"2px" }}>{s.l}</div>
              </div>
            ))}
          </div>
        </div>
      </header>

      {/* ─── HOW IT WORKS ─── */}
      <section style={{ padding:"60px 5%", background:"rgba(255,255,255,0.01)",
        borderTop:"1px solid rgba(255,255,255,0.04)", borderBottom:"1px solid rgba(255,255,255,0.04)" }}>
        <div style={{ textAlign:"center", marginBottom:"48px" }}>
          <div style={{ color:"rgba(255,255,255,0.3)", fontSize:"11px", fontWeight:"700",
            letterSpacing:"0.15em", textTransform:"uppercase", marginBottom:"10px" }}>إزاي بيشتغل</div>
          <h2 style={{ color:"#fff", fontSize:"clamp(22px,2.5vw,32px)", fontWeight:"900",
            letterSpacing:"-0.02em" }}>3 خطوات بس وخلاص</h2>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:"24px", maxWidth:"900px", margin:"0 auto" }}>
          {[
            { n:"01", title:"ابحث", desc:"ابحث باسم المنطقة أو الخدمة اللي محتاجها", color:"#22d3ee" },
            { n:"02", title:"قارن", desc:"شوف التقييمات والأسعار الحقيقية واختار الأنسب ليك", color:"#a78bfa" },
            { n:"03", title:"احجز", desc:"احجز في ثواني وفريق الشركة هيتواصل معاك فوراً", color:"#4ade80" },
          ].map(s=>(
            <div key={s.n} style={{ background:"rgba(255,255,255,0.02)",
              border:"1px solid rgba(255,255,255,0.06)", borderRadius:"20px", padding:"32px 28px" }}>
              <div style={{ color:s.color, fontSize:"11px", fontWeight:"800",
                letterSpacing:"0.15em", marginBottom:"16px" }}>{s.n}</div>
              <h3 style={{ color:"#fff", fontSize:"20px", fontWeight:"900", marginBottom:"10px" }}>{s.title}</h3>
              <p style={{ color:"rgba(255,255,255,0.4)", fontSize:"14px", lineHeight:"1.6", margin:0 }}>{s.desc}</p>
            </div>
          ))}
        </div>
      </section>

      {/* ─── COMPANIES ─── */}
      <section style={{ padding:"70px 5%" }}>
        {/* Section header */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end",
          marginBottom:"32px", flexWrap:"wrap", gap:"16px" }}>
          <div>
            <div style={{ color:"rgba(255,255,255,0.3)", fontSize:"11px", fontWeight:"700",
              letterSpacing:"0.15em", textTransform:"uppercase", marginBottom:"8px" }}>
              شركات النظافة
            </div>
            <h2 style={{ color:"#fff", fontSize:"clamp(20px,2.5vw,30px)", fontWeight:"900",
              letterSpacing:"-0.02em", margin:0 }}>
              {filtered.length} شركة متاحة
            </h2>
          </div>
          {/* Filters */}
          <div style={{ display:"flex", gap:"8px", flexWrap:"wrap" }}>
            <select value={area} onChange={e=>setArea(e.target.value)} style={selStyle}>
              {AREAS.map(a=><option key={a}>{a}</option>)}
            </select>
            <select value={service} onChange={e=>setService(e.target.value)} style={selStyle}>
              {SERVICES.map(s=><option key={s}>{s}</option>)}
            </select>
            <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={selStyle}>
              <option value="rating">الأعلى تقييماً</option>
              <option value="price_asc">الأقل سعراً</option>
              <option value="price_desc">الأعلى سعراً</option>
              <option value="reviews">الأكثر تقييماً</option>
            </select>
            <button onClick={()=>setOnlyAvail(!onlyAvail)} style={{
              ...selStyle,
              background: onlyAvail ? "rgba(34,211,238,0.12)" : "rgba(255,255,255,0.04)",
              border: onlyAvail ? "1px solid rgba(34,211,238,0.3)" : "1px solid rgba(255,255,255,0.1)",
              color: onlyAvail ? "#22d3ee" : "rgba(255,255,255,0.5)",
              cursor:"pointer", fontWeight: onlyAvail ? "700" : "500"
            }}>متاح الآن فقط</button>
          </div>
        </div>

        {/* Grid */}
        {filtered.length > 0 ? (
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))", gap:"20px" }}>
            {filtered.map((c,i)=>(
              <div key={c.id} className="card-enter" style={{ animationDelay:`${i*0.04}s` }}>
                <CompanyCard company={c} onBook={setBooking} index={i} />
              </div>
            ))}
          </div>
        ) : (
          <div style={{ textAlign:"center", padding:"80px 20px",
            background:"rgba(255,255,255,0.02)", borderRadius:"20px",
            border:"1px solid rgba(255,255,255,0.05)" }}>
            <div style={{ fontSize:"48px", marginBottom:"16px" }}>🔍</div>
            <div style={{ color:"rgba(255,255,255,0.5)", fontSize:"16px", fontWeight:"700", marginBottom:"8px" }}>
              مفيش نتايج
            </div>
            <div style={{ color:"rgba(255,255,255,0.25)", fontSize:"14px" }}>
              جرب تغير الفلتر أو ابحث بكلمة تانية
            </div>
          </div>
        )}
      </section>

      {/* ─── STATS BANNER ─── */}
      <section style={{ margin:"0 5%", padding:"48px", background:"rgba(34,211,238,0.04)",
        border:"1px solid rgba(34,211,238,0.12)", borderRadius:"24px", marginBottom:"60px" }}>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:"32px", textAlign:"center" }}>
          {[
            { n:"15+", l:"شركة مسجلة على المنصة" },
            { n:"مجاني", l:"الحجز بدون أي رسوم" },
            { n:"حقيقية", l:"تقييمات من Google Maps" },
            { n:"مباشر", l:"تواصل مع الشركة فوراً" },
          ].map(s=>(
            <div key={s.l}>
              <div style={{ color:"#22d3ee", fontWeight:"900", fontSize:"28px",
                letterSpacing:"-0.03em", marginBottom:"6px" }}>{s.n}</div>
              <div style={{ color:"rgba(255,255,255,0.35)", fontSize:"13px" }}>{s.l}</div>
            </div>
          ))}
        </div>
      </section>

      {/* ─── FAQ (SEO) ─── */}
      <FAQ />

      {/* ─── FOOTER ─── */}
      <footer style={{ borderTop:"1px solid rgba(255,255,255,0.06)",
        padding:"48px 5% 32px", background:"rgba(0,0,0,0.3)" }}>
        <div style={{ display:"grid", gridTemplateColumns:"2fr 1fr 1fr", gap:"48px", marginBottom:"40px" }}>
          <div>
            <div style={{ display:"flex", alignItems:"center", gap:"8px", marginBottom:"16px" }}>
              <div style={{ width:"32px", height:"32px", borderRadius:"8px",
                background:"linear-gradient(135deg,#22d3ee,#0891b2)",
                display:"flex", alignItems:"center", justifyContent:"center",
                fontSize:"14px", fontWeight:"900", color:"#000" }}>ن</div>
              <span style={{ fontSize:"18px", fontWeight:"900" }}>نظيف</span>
            </div>
            <p style={{ color:"rgba(255,255,255,0.35)", fontSize:"13px", lineHeight:"1.7", maxWidth:"280px", margin:0 }}>
              أكبر سوق لشركات النظافة في مصر. نربط العملاء بأفضل شركات التنظيف بطريقة شفافة وسهلة.
            </p>
            {/* SEO: structured keywords */}
            <div style={{ display:"flex", flexWrap:"wrap", gap:"8px", marginTop:"16px" }}>
              {["شركة تنظيف","تنظيف منازل","تنظيف شقق","القاهرة","الجيزة"].map(k=>(
                <span key={k} style={{ background:"rgba(255,255,255,0.04)",
                  color:"rgba(255,255,255,0.25)", fontSize:"11px",
                  padding:"3px 10px", borderRadius:"6px" }}>{k}</span>
              ))}
            </div>
          </div>
          <div>
            <h4 style={{ color:"rgba(255,255,255,0.5)", fontSize:"11px", fontWeight:"700",
              letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:"16px" }}>روابط</h4>
            {["الرئيسية","تسجيل شركتك","التقييمات","مدونتنا"].map(l=>(
              <div key={l} style={{ color:"rgba(255,255,255,0.4)", fontSize:"14px",
                marginBottom:"10px", cursor:"pointer" }}>{l}</div>
            ))}
          </div>
          <div>
            <h4 style={{ color:"rgba(255,255,255,0.5)", fontSize:"11px", fontWeight:"700",
              letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:"16px" }}>المناطق</h4>
            {["الشيخ زايد","التجمع الخامس","مدينة نصر","المعادي","مصر الجديدة"].map(l=>(
              <div key={l} style={{ color:"rgba(255,255,255,0.4)", fontSize:"14px",
                marginBottom:"10px", cursor:"pointer" }}>{l}</div>
            ))}
          </div>
        </div>
        <div style={{ borderTop:"1px solid rgba(255,255,255,0.05)", paddingTop:"24px",
          display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <span style={{ color:"rgba(255,255,255,0.2)", fontSize:"12px" }}>
            © 2026 نظيف. جميع الحقوق محفوظة.
          </span>
          <span style={{ color:"rgba(255,255,255,0.2)", fontSize:"12px" }}>
            شركة تنظيف | تنظيف منازل القاهرة | تنظيف شقق
          </span>
        </div>
      </footer>

      {booking && <BookingModal company={booking} onClose={()=>setBooking(null)} />}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
